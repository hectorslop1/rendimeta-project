name: rendimeta
description: "Rendichicas - App de productividad para despachadores"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.3
  workfire: ^1.0.2
  reward_popup: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/rendichicas-logo.png
    - assets/images/rendimetaIconlogo.png
