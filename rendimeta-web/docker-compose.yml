services:
  postgres:
    image: postgres:17-alpine
    container_name: gaslogistica_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rendichicas
      POSTGRES_PASSWORD: rendichicas2026
      POSTGRES_DB: gaslogistica_db
    ports:
      - "5441:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rendichicas -d gaslogistica_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
